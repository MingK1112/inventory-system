name: 打包出入库系统

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ---- macOS（Intel + M1/M2/M3 通用，M芯片通过 Rosetta 2 运行）----
  build-macos:
    runs-on: macos-13
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          cd inventory_system
          pip install PySide6==6.7.0 pyinstaller

      - name: 打包 macOS
        run: |
          cd inventory_system
          pyinstaller \
            --windowed --onedir \
            --name "出入库系统" \
            --exclude-module openpyxl \
            --exclude-module lxml \
            --add-data "styles.qss:." \
            --add-data "styles_light.qss:." \
            --add-data "config.json:." \
            --add-data "oil_inventory.db:." \
            --add-data "assets:assets" \
            main.py

      - name: 压缩 .app
        run: |
          cd inventory_system/dist
          zip -r 出入库系统_macOS.zip 出入库系统.app

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: 出入库系统_macOS
          path: inventory_system/dist/出入库系统_macOS.zip

  # ---- Windows 10 / 11 ----
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          cd inventory_system
          pip install PySide6==6.7.0 pyinstaller openpyxl

      - name: 打包 Windows 10/11
        run: |
          cd inventory_system
          pyinstaller --windowed --onedir --name "出入库系统" --add-data "styles.qss;." --add-data "styles_light.qss;." --add-data "config.json;." --add-data "oil_inventory.db;." --add-data "assets;assets" main.py

      - name: 压缩产物
        run: |
          cd inventory_system\dist
          Compress-Archive -Path 出入库系统\* -DestinationPath 出入库系统_Windows10_11.zip

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: 出入库系统_Windows10_11
          path: inventory_system\dist\出入库系统_Windows10_11.zip
